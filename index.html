<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        body { padding: 20px; background-color: #f4f6f9; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-screen" class="container text-center mt-5">
    <h2 class="mb-4">Team Portal Login</h2>
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-8">
            <input type="email" id="email-input" class="form-control mb-3" placeholder="Enter your email">
            <button onclick="login()" class="btn btn-primary w-100">Login</button>
            <p id="login-error" class="text-danger mt-3 fw-bold"></p>
        </div>
    </div>
</div>

<div id="dashboard-screen" class="container hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="welcome-message">Dashboard</h3>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>

    <div class="card mb-4 border-success">
        <div class="card-body text-center bg-light">
            <h5 class="card-title mb-3">Time Tracker</h5>
            <button onclick="clock('Clock In')" class="btn btn-success me-3 px-4">Clock In</button>
            <button onclick="clock('Clock Out')" class="btn btn-warning px-4">Clock Out</button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Tasks</h5>
                    <button onclick="loadData()" class="btn btn-sm btn-light">Refresh</button>
                </div>
                <div class="card-body table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Update</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">Inventory</h5>
                </div>
                <div class="card-body table-responsive">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Stock</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- PASTE YOUR GOOGLE APPS SCRIPT URL BELOW ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxioaF1ANQTAL-5pGlgTkeGhCtehC6MERT_noik3tWT-Gw3sgHn-l00nxPrCw1sNUJF/exec';
    // -----------------------------------------------

    let currentUser = '';
    let currentRole = '';

    // Core function to talk to Google Sheets securely
    async function apiCall(data) {
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // text/plain prevents CORS errors
                body: JSON.stringify(data)
            });
            return await response.json();
        } catch (error) {
            console.error(error);
            alert("Network Error. Did you deploy the App Script to 'Anyone'?");
        }
    }

    async function login() {
        const email = document.getElementById('email-input').value.trim();
        if (!email) return;

        document.getElementById('login-error').innerText = 'Logging in... please wait.';
        
        const result = await apiCall({ action: 'login', email: email });
        
        if (result && result.status === 'success') {
            currentUser = email;
            currentRole = result.role;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('welcome-message').innerText = `Dashboard (${currentRole})`;
            loadData(); // Fetch tasks and inventory
        } else {
            document.getElementById('login-error').innerText = 'Error: Email not found in the database.';
        }
    }

    function logout() {
        currentUser = '';
        currentRole = '';
        document.getElementById('email-input').value = '';
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('dashboard-screen').classList.add('hidden');
        document.getElementById('login-error').innerText = '';
    }

    async function clock(type) {
        const btnText = type === 'Clock In' ? 'Clocking In...' : 'Clocking Out...';
        document.getElementById('welcome-message').innerText = btnText;
        
        const result = await apiCall({ action: 'clock', email: currentUser, clockType: type });
        if (result && result.status === 'success') {
            alert(`Success! You logged: ${type}`);
            document.getElementById('welcome-message').innerText = `Dashboard (${currentRole})`;
        }
    }

    async function loadData() {
        document.getElementById('tasks-body').innerHTML = '<tr><td colspan="4" class="text-center text-muted">Loading data...</td></tr>';
        
        const result = await apiCall({ action: 'getData' });
        if (result && result.status === 'success') {
            renderTasks(result.tasks);
            renderInventory(result.inventory);
        }
    }

    function renderTasks(tasks) {
        const tbody = document.getElementById('tasks-body');
        tbody.innerHTML = '';

        tasks.forEach(task => {
            // Logic: Admins see everything. Users only see tasks assigned to their email.
            if (currentRole.toLowerCase() === 'admin' || task.assignedTo.toLowerCase() === currentUser.toLowerCase()) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${task.name}</strong><br><small class="text-muted">${task.notes}</small></td>
                    <td>${task.assignedTo}</td>
                    <td><span class="badge bg-info text-dark">${task.status}</span></td>
                    <td>
                        <select onchange="updateTask('${task.id}', this.value)" class="form-select form-select-sm">
                            <option value="">Update...</option>
                            <option value="Pending">Pending</option>
                            <option value="Doing">Doing</option>
                            <option value="Done">Done</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    async function updateTask(id, newStatus) {
        if (!newStatus) return;
        document.getElementById('welcome-message').innerText = 'Saving update...';
        
        const result = await apiCall({ action: 'updateTask', taskId: id, newStatus: newStatus });
        if (result && result.status === 'success') {
            document.getElementById('welcome-message').innerText = `Dashboard (${currentRole})`;
            loadData(); // Refresh to show new status
        } else {
            alert("Failed to update task.");
        }
    }

    function renderInventory(inventory) {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = '';

        inventory.forEach(inv => {
            // Highlight row in red if it needs buying
            const rowClass = inv.status.toLowerCase().includes('buy') ? 'table-danger' : '';
            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.innerHTML = `
                <td>${inv.item}</td>
                <td>${inv.inStock}</td>
                <td>${inv.status}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
